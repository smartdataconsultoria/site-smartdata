<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartData Consultoria</title>

  <style>
    body {font-family: Arial, sans-serif; margin:0;}
    .cta-nav {background:#0b5ed7;color:#fff;border:none;padding:12px 18px;border-radius:8px;cursor:pointer}

    /* MODAL */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal-overlay.open {display:flex;}

    .modal-card {
      background:#fff;
      padding:30px;
      border-radius:12px;
      width:90%;
      max-width:400px;
      position:relative;
      text-align:center;
    }

    .modal-close {
      position:absolute;
      top:10px;
      right:10px;
      background:none;
      border:none;
      font-size:18px;
      cursor:pointer;
    }

    .modal-btn {
      padding:12px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      background:#0b5ed7;
      color:#fff;
    }

    .modal-btn:hover {background:#084298}
  </style>
</head>
<body>

  <!-- BOTÃO PRINCIPAL -->
  <button class="cta-nav" onclick="openContatoModal()">Fale Conosco</button>


  <!-- MODAL CONTATO -->
  <div class="modal-overlay" id="contato-modal">
    <div class="modal-card">
      <button class="modal-close" onclick="closeContatoModal()">✕</button>

      <h2>Como podemos te ajudar?</h2>

      <div style="display:flex;flex-direction:column;gap:15px;margin-top:20px;">
        
        <button class="modal-btn" onclick="falarConsultor()">
          💬 Falar com Consultor
        </button>

        <button class="modal-btn" onclick="irDiagnostico()">
          📊 Solicitar Diagnóstico
        </button>

      </div>
    </div>
  </div>


  <script>
    function openContatoModal() {
      document.getElementById('contato-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeContatoModal() {
      document.getElementById('contato-modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    function falarConsultor() {
      window.open('https://wa.me/5581986260096', '_blank');
    }

    function irDiagnostico() {
      window.location.href = 'modelo.html';
    }
  </script>

</body>
</html>
