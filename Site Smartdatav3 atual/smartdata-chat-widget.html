<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartData — Chat Widget Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ─── DEMO PAGE ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sora', sans-serif;
    background: #0a0f1e;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    color: #f1f5f9;
  }
  .demo-hint {
    text-align: center;
    opacity: .35;
    font-size: .9rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    user-select: none;
    pointer-events: none;
  }

  /* ═══════════════════════════════════════════════
     FLOATING BUTTON
  ═══════════════════════════════════════════════ */
  #sd-fab {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a855f7 0%, #06b6d4 100%);
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(168,85,247,.45), 0 0 0 0 rgba(168,85,247,.35);
    display: flex; align-items: center; justify-content: center;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
    z-index: 99999;
    animation: fabPulse 3s ease-in-out infinite;
  }
  #sd-fab:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 40px rgba(168,85,247,.6), 0 0 0 8px rgba(168,85,247,.12);
    animation: none;
  }
  @keyframes fabPulse {
    0%,100% { box-shadow: 0 8px 32px rgba(168,85,247,.45), 0 0 0 0 rgba(168,85,247,.35); }
    50%      { box-shadow: 0 8px 32px rgba(168,85,247,.55), 0 0 0 14px rgba(168,85,247,0); }
  }
  #sd-fab svg { width: 26px; height: 26px; fill: white; transition: transform .3s; }
  #sd-fab.open svg.ico-chat { display: none; }
  #sd-fab.open svg.ico-close { display: block !important; }
  #sd-fab svg.ico-close { display: none; }
  #sd-fab.open { animation: none; }

  /* Notif badge */
  #sd-badge {
    position: fixed; bottom: 76px; right: 28px; z-index: 99999;
    background: linear-gradient(135deg,#a855f7,#06b6d4);
    color: white; font-size: .75rem; font-weight: 700;
    padding: .35rem .8rem; border-radius: 20px;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(168,85,247,.4);
    animation: badgeIn .5s cubic-bezier(.34,1.56,.64,1) .8s both;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
  }
  @keyframes badgeIn {
    from { opacity:0; transform: translateY(10px) scale(.8); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  #sd-badge.gone { display: none; }

  /* ═══════════════════════════════════════════════
     CHAT PANEL
  ═══════════════════════════════════════════════ */
  #sd-panel {
    position: fixed;
    bottom: 100px; right: 28px;
    width: 380px;
    max-height: 580px;
    height: 0;
    border-radius: 20px;
    background: #111827;
    border: 1px solid rgba(168,85,247,.25);
    box-shadow: 0 24px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(168,85,247,.1);
    display: flex; flex-direction: column;
    overflow: hidden;
    transform-origin: bottom right;
    transform: scale(.85) translateY(20px);
    opacity: 0;
    pointer-events: none;
    transition: transform .35s cubic-bezier(.34,1.26,.64,1),
                opacity .3s ease,
                height .35s cubic-bezier(.34,1.26,.64,1);
    z-index: 99998;
  }
  #sd-panel.open {
    height: 580px;
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }
  @media (max-width: 440px) {
    #sd-panel { width: calc(100vw - 20px); right: 10px; bottom: 86px; }
    #sd-fab   { right: 16px; bottom: 16px; }
    #sd-badge { right: 16px; bottom: 64px; }
  }

  /* Header */
  .sd-header {
    background: linear-gradient(135deg, #1a0a2e 0%, #0f172a 100%);
    border-bottom: 1px solid rgba(168,85,247,.2);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .sd-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg,#a855f7,#06b6d4);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
    box-shadow: 0 0 14px rgba(168,85,247,.4);
  }
  .sd-header-info { flex: 1; min-width: 0; }
  .sd-header-name {
    font-size: .9rem; font-weight: 700; color: #f1f5f9;
    font-family: 'Sora', sans-serif;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sd-header-status {
    font-size: .72rem; color: #34d399; display: flex; align-items: center; gap: 4px;
    font-family: 'Space Mono', monospace;
  }
  .sd-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #34d399;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .sd-header-close {
    background: none; border: none; cursor: pointer;
    color: #64748b; padding: 4px; border-radius: 6px;
    transition: color .2s, background .2s;
    display: flex;
  }
  .sd-header-close:hover { color: #f1f5f9; background: rgba(255,255,255,.08); }

  /* Messages area */
  .sd-messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
    scroll-behavior: smooth;
  }
  .sd-messages::-webkit-scrollbar { width: 4px; }
  .sd-messages::-webkit-scrollbar-track { background: transparent; }
  .sd-messages::-webkit-scrollbar-thumb { background: rgba(168,85,247,.3); border-radius: 2px; }

  /* Message bubbles */
  .sd-msg { display: flex; gap: 8px; align-items: flex-end; animation: msgIn .3s ease; }
  @keyframes msgIn {
    from { opacity:0; transform: translateY(8px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .sd-msg.user { flex-direction: row-reverse; }
  .sd-msg-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg,#a855f7,#06b6d4);
    display: flex; align-items: center; justify-content: center;
    font-size: .8rem;
  }
  .sd-msg.user .sd-msg-avatar {
    background: rgba(168,85,247,.2);
    border: 1px solid rgba(168,85,247,.3);
    font-size: .72rem; color: #a855f7;
  }
  .sd-bubble {
    max-width: 76%;
    padding: 10px 13px;
    border-radius: 16px;
    font-size: .84rem; line-height: 1.55;
    font-family: 'Sora', sans-serif;
  }
  .sd-msg.bot .sd-bubble {
    background: #1e293b;
    border: 1px solid rgba(168,85,247,.15);
    color: #e2e8f0;
    border-bottom-left-radius: 4px;
  }
  .sd-msg.user .sd-bubble {
    background: linear-gradient(135deg,rgba(168,85,247,.22),rgba(6,182,212,.15));
    border: 1px solid rgba(168,85,247,.3);
    color: #f1f5f9;
    border-bottom-right-radius: 4px;
  }

  /* Typing indicator */
  .sd-typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .sd-typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: #a855f7; display: block;
    animation: typBounce 1.2s ease-in-out infinite;
  }
  .sd-typing span:nth-child(2) { animation-delay: .18s; }
  .sd-typing span:nth-child(3) { animation-delay: .36s; }
  @keyframes typBounce {
    0%,80%,100% { transform: translateY(0); opacity:.4; }
    40%          { transform: translateY(-6px); opacity:1; }
  }

  /* Quick reply buttons */
  .sd-options {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 6px;
  }
  .sd-btn {
    padding: 7px 13px;
    background: transparent;
    border: 1px solid rgba(168,85,247,.35);
    border-radius: 20px;
    color: #c4b5fd;
    font-size: .78rem; font-weight: 600;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    transition: all .2s;
    white-space: nowrap;
  }
  .sd-btn:hover {
    background: rgba(168,85,247,.15);
    border-color: #a855f7;
    color: #f1f5f9;
    transform: translateY(-1px);
  }
  .sd-btn.primary {
    background: linear-gradient(135deg,rgba(168,85,247,.3),rgba(6,182,212,.2));
    border-color: rgba(168,85,247,.5);
    color: #e2d9f3;
  }
  .sd-btn.primary:hover {
    background: linear-gradient(135deg,rgba(168,85,247,.45),rgba(6,182,212,.3));
  }
  .sd-btn.cta {
    background: linear-gradient(135deg,#a855f7,#06b6d4);
    border-color: transparent; color: white;
    box-shadow: 0 4px 14px rgba(168,85,247,.35);
  }
  .sd-btn.cta:hover { box-shadow: 0 6px 20px rgba(168,85,247,.5); transform: translateY(-2px); }
  .sd-btn:disabled { opacity: .45; pointer-events: none; }

  /* Input area */
  .sd-input-row {
    border-top: 1px solid rgba(168,85,247,.15);
    padding: 10px 12px;
    display: flex; gap: 8px; align-items: center;
    background: #0f172a;
    flex-shrink: 0;
  }
  #sd-input {
    flex: 1; background: rgba(255,255,255,.06);
    border: 1px solid rgba(168,85,247,.2);
    border-radius: 22px;
    padding: 9px 14px;
    color: #f1f5f9; font-size: .83rem;
    font-family: 'Sora', sans-serif;
    outline: none; resize: none;
    transition: border-color .2s;
    line-height: 1.4;
  }
  #sd-input:focus { border-color: rgba(168,85,247,.5); }
  #sd-input::placeholder { color: #475569; }
  #sd-send {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg,#a855f7,#06b6d4);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 3px 10px rgba(168,85,247,.35);
  }
  #sd-send:hover { transform: scale(1.1); box-shadow: 0 5px 16px rgba(168,85,247,.5); }
  #sd-send:disabled { opacity: .4; pointer-events: none; }
  #sd-send svg { width: 16px; height: 16px; fill: white; margin-left: 2px; }

  .sd-powered {
    text-align: center;
    font-size: .62rem;
    color: #334155;
    padding: 3px 0 5px;
    font-family: 'Space Mono', monospace;
    letter-spacing: .05em;
    flex-shrink: 0;
    background: #0f172a;
  }

  /* Highlight words */
  .hl { color: #a855f7; font-weight: 600; }
  .hl2 { color: #34d399; font-weight: 600; }
</style>
</head>
<body>
<div class="demo-hint">
  ↙ Chat flutuante SmartData — clique no botão abaixo
</div>

<!-- ── BADGE ── -->
<div id="sd-badge" onclick="toggleChat()">💬 Olá! Posso te ajudar?</div>

<!-- ── FAB ── -->
<button id="sd-fab" onclick="toggleChat()" aria-label="Abrir chat SmartData">
  <!-- chat icon -->
  <svg class="ico-chat" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
  <!-- close icon -->
  <svg class="ico-close" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
</button>

<!-- ── PANEL ── -->
<div id="sd-panel">
  <!-- Header -->
  <div class="sd-header">
    <div class="sd-avatar">🤖</div>
    <div class="sd-header-info">
      <div class="sd-header-name">Assistente SmartData</div>
      <div class="sd-header-status"><span class="sd-dot"></span>Online agora</div>
    </div>
    <button class="sd-header-close" onclick="toggleChat()" aria-label="Fechar chat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>

  <!-- Messages -->
  <div class="sd-messages" id="sd-messages"></div>

  <!-- Input -->
  <div class="sd-input-row">
    <textarea id="sd-input" rows="1" placeholder="Digite sua mensagem..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sd-send" onclick="sendUserMessage()" aria-label="Enviar">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="sd-powered">powered by SmartData ✦ Claude AI</div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  SmartData Chat Widget — Claude-powered assistant
// ════════════════════════════════════════════════════════════

const SYSTEM_PROMPT = `Você é o assistente inteligente da SmartData Consultoria, especializado em ajudar empresas brasileiras a melhorarem seus resultados usando análise de dados, dashboards e Business Intelligence.

Seu objetivo principal é:
1. Identificar os desafios do usuário na área de dados/gestão
2. Criar conexão emocional com os problemas que ele enfrenta
3. Mostrar como a SmartData pode resolver esses problemas
4. Guiar o usuário para agendar uma consulta ou falar com um especialista

PERSONALIDADE:
- Tom consultivo, amigável e direto
- Use linguagem clara, sem jargão técnico excessivo
- Seja empático com as dores do negócio
- Respostas concisas (2-4 parágrafos no máximo)
- Use ocasionalmente emojis relevantes para tornar mais amigável

CONTEXTO SOBRE A SMARTDATA:
- Consultoria especializada em Business Intelligence e análise de dados
- Criamos dashboards em Power BI personalizados
- Ajudamos empresas a organizar dados, planilhas e processos
- Temos planos Start, Profissional e Pro Plus
- App exclusivo SMARTPDV para promotores de venda
- WhatsApp para contato: +55 81 99542-6006
- Site: smartdataconsultoria.com

DIRETRIZES DE RESPOSTA:
- Quando o usuário mencionar vendas → foque em crescimento, controle e visibilidade
- Quando mencionar estoque → foque em capital parado, ruptura e giro
- Quando mencionar financeiro → foque em lucro, margem e custos ocultos
- Quando mencionar planilhas/dados → foque em organização, tempo perdido e erros
- Quando mencionar gestão → foque em indicadores, decisões e eficiência

FORMATO DE RESPOSTA:
- Responda em texto corrido (sem markdown com asteriscos ou hashtags)
- Use parágrafos curtos
- Seja direto e objetivo
- Sempre termine com uma pergunta ou chamada para ação quando apropriado
- Quando sugerir falar com especialista, mencione o WhatsApp: (81) 99542-6006

IMPORTANTE: Não forneça informações técnicas genéricas. Sempre conecte a resposta com os serviços da SmartData e com resultados práticos para o negócio do usuário.`;

// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════
let chatOpen = false;
let isTyping = false;
let conversation = []; // {role, content}
let awaitingButtons = false;

// ════════════════════════════════════════════════════════════
//  TOGGLE
// ════════════════════════════════════════════════════════════
function toggleChat() {
  chatOpen = !chatOpen;
  const panel = document.getElementById('sd-panel');
  const fab   = document.getElementById('sd-fab');
  const badge = document.getElementById('sd-badge');
  panel.classList.toggle('open', chatOpen);
  fab.classList.toggle('open', chatOpen);
  badge.classList.add('gone');
  if (chatOpen && conversation.length === 0) {
    setTimeout(startConversation, 350);
  }
  if (chatOpen) {
    setTimeout(() => document.getElementById('sd-input').focus(), 400);
  }
}

// ════════════════════════════════════════════════════════════
//  INITIAL FLOW
// ════════════════════════════════════════════════════════════
function startConversation() {
  addBotMessage(
    'Olá! 👋 Sou o assistente da <span class="hl">SmartData Consultoria</span>. ' +
    'Vou te ajudar a identificar oportunidades no seu negócio usando dados.\n\n' +
    'Primeiro, me conta: <strong>qual área você quer melhorar hoje?</strong>',
    [
      { label: '📊 Vendas',                value: 'Quero melhorar minha área de Vendas' },
      { label: '📦 Estoque / Logística',   value: 'Tenho problemas com Estoque e Logística' },
      { label: '💸 Financeiro',            value: 'Preciso melhorar meu controle Financeiro' },
      { label: '📁 Dados / Planilhas',     value: 'Tenho dificuldade com Dados e Planilhas' },
      { label: '📈 Gestão / Indicadores',  value: 'Quero melhorar minha Gestão e Indicadores' },
      { label: '🤝 Falar com especialista',value: 'Quero falar diretamente com um especialista' },
    ]
  );
}

// ════════════════════════════════════════════════════════════
//  MESSAGE RENDERING
// ════════════════════════════════════════════════════════════
function addBotMessage(html, buttons = [], isStreaming = false) {
  const msgs = document.getElementById('sd-messages');

  const wrap = document.createElement('div');
  wrap.className = 'sd-msg bot';
  wrap.innerHTML = `
    <div class="sd-msg-avatar">🤖</div>
    <div>
      <div class="sd-bubble">${formatText(html)}</div>
      ${buttons.length ? renderButtons(buttons) : ''}
    </div>
  `;
  msgs.appendChild(wrap);
  scrollToBottom();
  return wrap;
}

function formatText(txt) {
  // Convert newlines to <br>, keep HTML as-is
  return txt.replace(/\n/g, '<br>');
}

function renderButtons(buttons) {
  const btns = buttons.map((b, i) => {
    const cls = b.cta ? 'cta' : (i === 0 ? 'primary' : '');
    return `<button class="sd-btn ${cls}" onclick="handleButtonClick(this, '${escHtml(b.value)}', '${escHtml(b.label)}')">${b.label}</button>`;
  }).join('');
  return `<div class="sd-options">${btns}</div>`;
}

function escHtml(str) {
  return (str || '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

function addUserMessage(text) {
  const msgs = document.getElementById('sd-messages');
  const wrap = document.createElement('div');
  wrap.className = 'sd-msg user';
  wrap.innerHTML = `
    <div class="sd-msg-avatar">👤</div>
    <div class="sd-bubble">${formatText(text)}</div>
  `;
  msgs.appendChild(wrap);
  scrollToBottom();
}

function showTyping() {
  const msgs = document.getElementById('sd-messages');
  const el = document.createElement('div');
  el.className = 'sd-msg bot'; el.id = 'sd-typing-indicator';
  el.innerHTML = `
    <div class="sd-msg-avatar">🤖</div>
    <div class="sd-bubble">
      <div class="sd-typing"><span></span><span></span><span></span></div>
    </div>
  `;
  msgs.appendChild(el);
  scrollToBottom();
}

function removeTyping() {
  const el = document.getElementById('sd-typing-indicator');
  if (el) el.remove();
}

function scrollToBottom() {
  const msgs = document.getElementById('sd-messages');
  msgs.scrollTop = msgs.scrollHeight;
}

// ════════════════════════════════════════════════════════════
//  BUTTON CLICK → send as user message
// ════════════════════════════════════════════════════════════
function handleButtonClick(btn, value, label) {
  // Disable all buttons in the same options group
  const group = btn.closest('.sd-options');
  if (group) group.querySelectorAll('.sd-btn').forEach(b => b.disabled = true);

  addUserMessage(label);
  callClaude(value);
}

// ════════════════════════════════════════════════════════════
//  FREE-TEXT INPUT
// ════════════════════════════════════════════════════════════
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendUserMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function sendUserMessage() {
  const input = document.getElementById('sd-input');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = ''; input.style.height = 'auto';
  addUserMessage(text);
  callClaude(text);
}

// ════════════════════════════════════════════════════════════
//  CLAUDE API CALL
// ════════════════════════════════════════════════════════════
async function callClaude(userMessage) {
  if (isTyping) return;
  isTyping = true;
  document.getElementById('sd-send').disabled = true;

  // Add to conversation history
  conversation.push({ role: 'user', content: userMessage });

  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversation
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.error) {
      throw new Error(data.error.message || 'API error');
    }

    const assistantText = data.content?.[0]?.text || 'Desculpe, ocorreu um erro. Tente novamente.';

    // Add to history
    conversation.push({ role: 'assistant', content: assistantText });

    // Determine if we should show quick action buttons
    const buttons = getContextualButtons(userMessage, assistantText);
    addBotMessage(assistantText, buttons);

  } catch (err) {
    removeTyping();
    console.error('Claude API error:', err);
    addBotMessage(
      'Desculpe, tive um problema de conexão. Que tal falar diretamente com nossa equipe?',
      [
        { label: '💬 WhatsApp', value: 'whatsapp', cta: true },
        { label: '🔄 Tentar novamente', value: userMessage }
      ]
    );
  } finally {
    isTyping = false;
    document.getElementById('sd-send').disabled = false;
  }
}

// ════════════════════════════════════════════════════════════
//  CONTEXTUAL BUTTONS LOGIC
// ════════════════════════════════════════════════════════════
function getContextualButtons(userMsg, botResponse) {
  const msgLower = (userMsg + ' ' + botResponse).toLowerCase();
  const turnCount = conversation.length;

  // WhatsApp redirect
  if (userMsg === 'whatsapp' || msgLower.includes('especialista') || msgLower.includes('whatsapp')) {
    window.open('https://wa.me/5581995426006', '_blank');
    return [];
  }

  // After 3+ turns, show closing CTAs
  if (turnCount >= 6) {
    return [
      { label: '🚀 Ver na prática', value: 'Quero ver como um dashboard resolveria meu problema na prática' },
      { label: '💬 Falar com especialista', value: 'whatsapp', cta: true },
      { label: '📊 Ver planos', value: 'Quais são os planos e preços da SmartData?' }
    ];
  }

  // Vendas flow
  if (msgLower.includes('vendas') && turnCount <= 4) {
    return [
      { label: '📉 Minhas vendas caíram', value: 'Minhas vendas caíram e não sei o motivo' },
      { label: '❓ Não sei o que mais vende', value: 'Não consigo identificar quais produtos vendem mais' },
      { label: '💡 Não sei o que dá lucro', value: 'Não sei quais produtos dão mais lucro na minha empresa' },
      { label: '📋 Sem controle de vendas', value: 'Não tenho controle adequado das minhas vendas' },
    ];
  }

  // Estoque flow
  if ((msgLower.includes('estoque') || msgLower.includes('logística')) && turnCount <= 4) {
    return [
      { label: '📦 Produto parado', value: 'Tenho muito produto parado no estoque' },
      { label: '🔴 Falta de produto', value: 'Falta produto importante na hora da venda' },
      { label: '🤔 Compro sem dados', value: 'Faço compras sem base em dados históricos' },
      { label: '❌ Sem controle', value: 'Não tenho controle algum do meu estoque' },
    ];
  }

  // Financeiro flow
  if (msgLower.includes('financeiro') && turnCount <= 4) {
    return [
      { label: '💰 Não sei se tenho lucro', value: 'Não sei se minha empresa está tendo lucro de verdade' },
      { label: '📊 Não sei minha margem', value: 'Não sei qual é minha margem de lucro por produto' },
      { label: '🔍 Onde perco dinheiro', value: 'Não sei onde estou perdendo dinheiro no meu negócio' },
      { label: '🗂️ Financeiro bagunçado', value: 'Meu controle financeiro é totalmente desorganizado' },
    ];
  }

  // Dados/Planilhas flow
  if ((msgLower.includes('planilha') || msgLower.includes('dado')) && turnCount <= 4) {
    return [
      { label: '😵 Planilhas bagunçadas', value: 'Tenho várias planilhas desorganizadas e sem padrão' },
      { label: '⚡ Dados não batem', value: 'Os dados de diferentes áreas não batem entre si' },
      { label: '⏱️ Perco tempo manual', value: 'Perco muito tempo com controle e relatórios manuais' },
      { label: '😟 Não confio nos números', value: 'Não confio nos números que tenho disponíveis' },
    ];
  }

  // Gestão/Indicadores flow
  if ((msgLower.includes('gestão') || msgLower.includes('indicador') || msgLower.includes('dashboard')) && turnCount <= 4) {
    return [
      { label: '🎯 Sem indicadores', value: 'Não tenho KPIs e indicadores bem definidos' },
      { label: '🤞 Decisão no feeling', value: 'Tomo decisões com base na intuição, sem dados' },
      { label: '📈 Tenho mas não uso bem', value: 'Tenho alguns indicadores mas não sei como usá-los' },
      { label: '💎 Quero dashboards', value: 'Quero montar dashboards profissionais para minha empresa' },
    ];
  }

  // Generic follow-up after 2 turns
  if (turnCount >= 4) {
    return [
      { label: '🚀 Como a SmartData resolve?', value: 'Como exatamente a SmartData resolveria esse problema?' },
      { label: '💬 Falar com especialista', value: 'whatsapp', cta: true },
    ];
  }

  return [];
}
