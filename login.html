<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartData | Área do Cliente</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

    :root {
      --bg-dark:     #0a0e1a;
      --bg-card:     #111827;
      --bg-input:    #1a2235;
      --border:      rgba(255,255,255,0.07);
      --accent:      #4f8ef7;
      --accent-dark: #2563eb;
      --text:        #f1f5f9;
      --text-muted:  #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      background: var(--bg-dark);
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(79,142,247,0.1) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: 0;
      pointer-events: none;
    }

    .card {
      background: rgba(17, 24, 39, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(79,142,247,0.07);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(79,142,247,0.35);
    }

    .logo-icon svg { width: 32px; height: 32px; fill: #fff; }

    .logo-area h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .logo-area p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .field-row label { margin-bottom: 0; }

    .forgot { font-size: 12px; color: var(--accent); text-decoration: none; cursor: pointer; }
    .forgot:hover { text-decoration: underline; }

    .input-wrap { position: relative; }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: rgba(26, 34, 53, 0.85);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
    }

    input::placeholder { color: var(--text-muted); }

    .toggle-pwd {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: var(--text-muted);
      display: flex; align-items: center;
      padding: 0; transition: color 0.2s;
    }
    .toggle-pwd:hover { color: var(--accent); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 15px; font-weight: 600;
      border: none; border-radius: 10px;
      cursor: pointer; margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(79,142,247,0.35);
    }

    .btn-login:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .msg-box {
      border-radius: 8px;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 14px;
      display: none;
    }
    .msg-error {
      background: rgba(224,85,85,0.12);
      border: 1px solid rgba(224,85,85,0.3);
      color: #f08080;
    }
    .msg-success {
      background: rgba(52,201,126,0.12);
      border: 1px solid rgba(52,201,126,0.3);
      color: #5ddb9a;
    }

    .footer-brand {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .footer-brand strong { color: var(--accent); }

    .link-voltar {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
    }
    .link-voltar:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- CARD LOGIN -->
<div class="card" id="cardLogin">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
    </div>
    <h1>Smart<span style="color:var(--accent)">Data</span></h1>
    <p>Área do Cliente</p>
  </div>

  <div class="msg-box msg-error" id="loginError"></div>

  <div class="field">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
  </div>

  <div class="field">
    <div class="field-row">
      <label>Senha</label>
      <a class="forgot" id="linkEsqueci">Esqueceu sua senha?</a>
    </div>
    <div class="input-wrap">
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
      <button class="toggle-pwd" id="togglePwd" type="button">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <button class="btn-login" id="btnLogin">Entrar</button>

  <div class="footer-brand">
    <span style="font-size:11px;">Desenvolvido pela <strong>SmartData</strong> Consultoria</span>
  </div>
</div>

<!-- CARD RECUPERAR SENHA -->
<div class="card" id="cardRecovery" style="display:none;">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
    </div>
    <h1>Recuperar Senha</h1>
    <p>Enviaremos um link para seu e-mail</p>
  </div>

  <div class="msg-box msg-error"   id="recoveryError"></div>
  <div class="msg-box msg-success" id="recoverySuccess"></div>

  <div class="field">
    <label>E-mail</label>
    <input type="email" id="recoveryEmail" placeholder="seu@email.com" />
  </div>

  <button class="btn-login" id="btnRecovery">Enviar link de recuperação</button>

  <a class="link-voltar" id="linkVoltar">← Voltar ao login</a>

  <div class="footer-brand">
    <span style="font-size:11px;">Desenvolvido pela <strong>SmartData</strong> Consultoria</span>
  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://rbahvyejqybajnufftio.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiYWh2eWVqcXliYWpudWZmdGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjA5MjIsImV4cCI6MjA4OTYzNjkyMn0.nUIo2CT3o41YL1TT8Hrp5kq-_ZS-bMMf-gvUMCEyYMw';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  const cardLogin    = document.getElementById('cardLogin');
  const cardRecovery = document.getElementById('cardRecovery');

  // ─── Toggle senha ─────────────────────────────────────────────────────────────
  document.getElementById('togglePwd').addEventListener('click', () => {
    const inp = document.getElementById('senha');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  // ─── Login ────────────────────────────────────────────────────────────────────
  document.getElementById('senha').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  document.getElementById('btnLogin').addEventListener('click', login);

  async function login() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const btn   = document.getElementById('btnLogin');
    const err   = document.getElementById('loginError');

    err.style.display = 'none';
    if (!email || !senha) { showMsg('loginError', 'Preencha e-mail e senha.'); return; }

    btn.disabled = true;
    btn.textContent = 'Entrando…';

    const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });

    if (error) {
      showMsg('loginError', 'E-mail ou senha inválidos. Tente novamente.');
      btn.disabled = false;
      btn.textContent = 'Entrar';
    } else {
      // ─── Registra o login na tabela logs_acesso ───────────────────────────────
      await sb.from('logs_acesso').insert({
        usuario_id: data.user.id,
        email:      data.user.email,
        evento:     'login',
        pagina:     window.location.pathname,
        user_agent: navigator.userAgent
      });

      window.location.href = 'app/dashboard.html';
    }
  }

  // ─── Esqueceu senha ───────────────────────────────────────────────────────────
  document.getElementById('linkEsqueci').addEventListener('click', () => {
    cardLogin.style.display    = 'none';
    cardRecovery.style.display = 'block';
  });

  document.getElementById('linkVoltar').addEventListener('click', () => {
    cardRecovery.style.display = 'none';
    cardLogin.style.display    = 'block';
    document.getElementById('recoveryEmail').value = '';
    document.getElementById('recoveryError').style.display   = 'none';
    document.getElementById('recoverySuccess').style.display = 'none';
  });

  document.getElementById('recoveryEmail').addEventListener('keydown', e => {
    if (e.key === 'Enter') enviarRecuperacao();
  });

  document.getElementById('btnRecovery').addEventListener('click', enviarRecuperacao);

  async function enviarRecuperacao() {
    const email = document.getElementById('recoveryEmail').value.trim();
    const btn   = document.getElementById('btnRecovery');

    document.getElementById('recoveryError').style.display   = 'none';
    document.getElementById('recoverySuccess').style.display = 'none';

    if (!email) { showMsg('recoveryError', 'Informe seu e-mail.'); return; }

    btn.disabled = true;
    btn.textContent = 'Enviando…';

    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://smartdataconsultoria.com/reset-senha.html'
    });

    btn.disabled = false;
    btn.textContent = 'Enviar link de recuperação';

    if (error) {
      showMsg('recoveryError', 'Erro ao enviar. Verifique o e-mail e tente novamente.');
    } else {
      document.getElementById('recoverySuccess').textContent = 'Link enviado! Verifique sua caixa de entrada.';
      document.getElementById('recoverySuccess').style.display = 'block';
    }
  }

  function showMsg(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  // ─── Redirecionar se já logado ────────────────────────────────────────────────
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'app/dashboard.html';
  })();
</script>
</body>
</html>
