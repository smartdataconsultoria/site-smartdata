<script>
  // PROTEÇÃO: evita quebrar se Supabase não estiver configurado
  let sb = null;
  try {
    if (typeof supabase !== 'undefined' && SUPABASE_URL && SUPABASE_ANON_KEY) {
      const { createClient } = supabase;
      sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
  } catch (e) {
    console.warn("Supabase não configurado ainda.");
  }

  const state = {
    porte:'', ndash:'', freq:'', suporte:'', nfontes:'',
    budget:'', prazo:'', bd:'', ti:'', ws:'', trein:'', reun:'',
    decisao:[], dados:[], areas:[], app:[]
  };

  let currentStep = 1;

  function goTo(step) {
    console.log("Indo para etapa:", step);

    const atual = document.getElementById('s' + currentStep);
    const proxima = document.getElementById('s' + step);

    if (!proxima) {
      console.error("Etapa não encontrada:", step);
      return;
    }

    if (atual) atual.classList.remove('active');
    proxima.classList.add('active');

    currentStep = step;

    const pct = Math.round((step / 8) * 100);
    document.getElementById('prog').style.width = pct + '%';
    document.getElementById('step-pct').textContent = pct + '%';
    document.getElementById('step-lbl').textContent =
      step <= 7 ? 'Etapa ' + step + ' de 7' : 'Resultado';

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function selCard(el, key, val) {
    const grid = el.closest('[id$="-grid"]');
    if (!grid) return;

    grid.querySelectorAll('.card-opt').forEach(c => c.classList.remove('sel'));
    el.classList.add('sel');
    state[key] = val;
  }

  function togChip(el, key) {
    el.classList.toggle('sel');
    state[key] = Array.from(el.parentElement.querySelectorAll('.chip.sel'))
      .map(c => c.textContent.trim());
  }

  function selChipSingle(el, key) {
    el.parentElement.querySelectorAll('.chip')
      .forEach(c => c.classList.remove('sel'));

    el.classList.add('sel');
    state[key] = el.textContent.trim();
  }
</script>
