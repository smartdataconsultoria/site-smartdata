<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renaux | Acesse sua conta</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-dark:     #0a0e1a;
      --bg-card:     #111827;
      --bg-input:    #1a2235;
      --border:      #1e2d45;
      --accent:      #f5a623;
      --accent-dark: #c47d0e;
      --text:        #e8eaf0;
      --text-muted:  #6b7a99;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;

      /* Imagem de fundo */
      background-image: url('./fundo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Overlay escuro sobre a imagem */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(8, 12, 24, 0.72);
      z-index: 0;
      pointer-events: none;
    }

    /* Grade dourada sutil */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,166,35,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,166,35,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
      pointer-events: none;
    }

    .card {
      background: rgba(17, 24, 39, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(245,166,35,0.07);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(245,166,35,0.3);
    }

    .logo-icon svg { width: 32px; height: 32px; fill: #fff; }

    .logo-area h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .logo-area p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .field-row label { margin-bottom: 0; }

    .forgot { font-size: 12px; color: var(--accent); text-decoration: none; }
    .forgot:hover { text-decoration: underline; }

    .input-wrap { position: relative; }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: rgba(26, 34, 53, 0.85);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245,166,35,0.12);
    }

    input::placeholder { color: var(--text-muted); }

    .toggle-pwd {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: var(--text-muted);
      display: flex; align-items: center;
      padding: 0; transition: color 0.2s;
    }
    .toggle-pwd:hover { color: var(--accent); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 15px; font-weight: 600;
      border: none; border-radius: 10px;
      cursor: pointer; margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(245,166,35,0.35);
    }

    .btn-login:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .error-msg {
      background: rgba(224,85,85,0.12);
      border: 1px solid rgba(224,85,85,0.3);
      border-radius: 8px;
      color: #f08080;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 14px;
      display: none;
    }

    .divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      margin: 20px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%; width: 42%; height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .footer-brand {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .footer-brand strong { color: var(--accent); }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="12" width="4" height="9" rx="1"/>
        <rect x="10" y="7" width="4" height="14" rx="1"/>
        <rect x="17" y="3" width="4" height="18" rx="1"/>
      </svg>
    </div>
    <h1>Acesse sua conta</h1>
    <p>Visualize seus dashboards de Business Intelligence</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="field">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
  </div>

  <div class="field">
    <div class="field-row">
      <label>Senha</label>
      <a href="#" class="forgot">Esqueceu sua senha?</a>
    </div>
    <div class="input-wrap">
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
      <button class="toggle-pwd" id="togglePwd" type="button">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <button class="btn-login" id="btnLogin">Entrar</button>

  <div class="divider">ou</div>

  <div class="footer-brand">
    <strong>Renaux</strong> <span>· Portal de Dashboards</span><br>
    <span style="font-size:11px;margin-top:4px;display:block;">
      Powered by <strong>SmartData</strong> Consultoria
    </span>
  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://rbahvyejqybajnufftio.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiYWh2eWVqcXliYWpudWZmdGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjA5MjIsImV4cCI6MjA4OTYzNjkyMn0.nUIo2CT3o41YL1TT8Hrp5kq-_ZS-bMMf-gvUMCEyYMw';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  document.getElementById('togglePwd').addEventListener('click', () => {
    const inp = document.getElementById('senha');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('senha').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  document.getElementById('btnLogin').addEventListener('click', login);

  async function login() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const btn   = document.getElementById('btnLogin');
    const err   = document.getElementById('errorMsg');

    err.style.display = 'none';
    if (!email || !senha) { showError('Preencha e-mail e senha.'); return; }

    btn.disabled = true;
    btn.textContent = 'Entrando…';

    const { error } = await sb.auth.signInWithPassword({ email, password: senha });

    if (error) {
      showError('E-mail ou senha inválidos. Tente novamente.');
      btn.disabled = false;
      btn.textContent = 'Entrar';
    } else {
      window.location.href = 'dashboard.html';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'dashboard.html';
  })();
</script>
</body>
</html>
