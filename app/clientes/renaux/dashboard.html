<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renaux | Dashboards</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-dark:    #0a0e1a;
      --bg-sidebar: #0d1120;
      --bg-card:    #111827;
      --bg-input:   #1a2235;
      --border:     #1e2d45;
      --accent:     #f5a623;
      --accent-dk:  #c47d0e;
      --text:       #e8eaf0;
      --text-muted: #6b7a99;
      --success:    #34c97e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR ─────────────────────────────────────────────────────────────── */
    .topbar {
      height: 60px;
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .topbar-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dk));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar-icon svg { width: 18px; height: 18px; fill: #fff; }

    .topbar-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .topbar-name strong { color: var(--accent); }

    .topbar-spacer { flex: 1; }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-email {
      font-size: 12px;
      color: var(--text-muted);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-logout {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

    /* ── LAYOUT ─────────────────────────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
    }

    /* ── SIDEBAR ─────────────────────────────────────────────────────────────── */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-section {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 8px;
      margin: 8px 0 4px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.15s;
      border: 1px solid transparent;
      text-decoration: none;
    }

    .sidebar-item:hover {
      background: var(--bg-input);
      color: var(--text);
    }

    .sidebar-item.active {
      background: rgba(245,166,35,0.12);
      border-color: rgba(245,166,35,0.25);
      color: var(--accent);
    }

    .sidebar-item .item-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      background: var(--bg-input);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      color: var(--text-muted);
    }

    .sidebar-item.active .badge {
      background: rgba(245,166,35,0.2);
      color: var(--accent);
    }

    /* ── MAIN ────────────────────────────────────────────────────────────────── */
    .main {
      flex: 1;
      padding: 40px 40px;
      overflow-y: auto;
    }

    .page-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }

    .page-sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 36px;
    }

    /* ── ADMIN BAR ───────────────────────────────────────────────────────────── */
    .admin-bar {
      background: rgba(245,166,35,0.08);
      border: 1px solid rgba(245,166,35,0.2);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 28px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .admin-bar svg { width: 16px; height: 16px; flex-shrink: 0; }

    .btn-admin {
      margin-left: auto;
      background: var(--accent);
      color: #000;
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
    }

    /* ── CARDS GRID ──────────────────────────────────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      animation: fadeIn 0.4s ease both;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
      border-color: rgba(245,166,35,0.3);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-thumb {
      height: 160px;
      background: linear-gradient(135deg, #0d1a2e, #152236);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .card-thumb::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .thumb-icon {
      position: relative;
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 80px;
    }

    .thumb-bar {
      width: 18px;
      border-radius: 4px 4px 0 0;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dk) 100%);
      opacity: 0.85;
    }

    .card-body { padding: 20px 22px 22px; }

    .card-cat {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
    }

    .btn-open {
      display: flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dk));
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn-open:hover { opacity: 0.88; }

    /* ── EMPTY STATE ─────────────────────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty svg { width: 48px; height: 48px; opacity: 0.3; margin-bottom: 16px; }
    .empty p { font-size: 14px; }

    /* ── LOADING ─────────────────────────────────────────────────────────────── */
    .loading {
      display: flex;
      justify-content: center;
      padding: 60px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ADMIN MODAL ─────────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 90%;
      max-width: 560px;
      padding: 32px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }

    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }

    .form-group select option { background: var(--bg-card); }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .btn-cancel {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-save {
      background: var(--accent);
      color: #000;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      border: none;
      padding: 10px 22px;
      border-radius: 8px;
      cursor: pointer;
    }

    /* Responsive */
    @media (max-width: 700px) {
      .sidebar { display: none; }
      .main { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a href="dashboard.html" class="topbar-logo">
    <div class="topbar-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
    </div>
    <span class="topbar-name"><strong>Renaux</strong></span>
  </a>

  <div class="topbar-spacer"></div>

  <div class="topbar-user">
    <span class="user-email" id="userEmail">—</span>
    <button class="btn-logout" id="btnLogout">Sair</button>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">Menu</div>
    <a class="sidebar-item active" id="filterTodos" href="#">
      <span class="item-left">
        <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Todos
      </span>
      <span class="badge" id="badgeTodos">0</span>
    </a>

    <div class="sidebar-section" style="margin-top:16px;">Categorias</div>
    <div id="categoriasList"></div>

    <div class="sidebar-section" style="margin-top:16px; border-top:1px solid var(--border); padding-top:16px;">
      <a class="sidebar-item" id="adminLink" href="#" style="display:none;">
        <span class="item-left">
          <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a5 5 0 015 5 5 5 0 01-5 5 5 5 0 01-5-5 5 5 0 015-5zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"/></svg>
          Administração
        </span>
      </a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <h1 class="page-title">Dashboards</h1>
    <p class="page-sub">Bem-vindo ao seu painel de dashboards.</p>

    <!-- Admin bar -->
    <div class="admin-bar" id="adminBar">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Você está como <strong>Administrador</strong>. Gerencie quais dashboards cada usuário pode ver.
      <button class="btn-admin" id="btnNovoDb">+ Novo Dashboard</button>
    </div>

    <!-- Cards -->
    <div id="loading" class="loading"><div class="spinner"></div></div>
    <div class="cards-grid" id="cardsGrid" style="display:none;"></div>
    <div class="empty" id="emptyState" style="display:none;">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
      <p>Nenhum dashboard disponível para sua conta.</p>
    </div>
  </main>
</div>

<!-- MODAL ADMIN -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">

    <!-- Abas -->
    <div style="display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border);">
      <button id="tabDb" onclick="switchTab('db')" style="flex:1;padding:10px;background:none;border:none;border-bottom:2px solid var(--accent);color:var(--accent);font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;cursor:pointer;">+ Novo Dashboard</button>
      <button id="tabUser" onclick="switchTab('user')" style="flex:1;padding:10px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;cursor:pointer;">+ Novo Usuário</button>
    </div>

    <!-- Aba Dashboard -->
    <div id="panelDb">
      <div class="form-group">
        <label>E-mail do usuário</label>
        <input type="email" id="mEmail" placeholder="usuario@renaux.com.br" />
      </div>
      <div class="form-group">
        <label>Título</label>
        <input type="text" id="mTitulo" placeholder="Ex.: Gestão Comercial" />
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <input type="text" id="mCategoria" placeholder="Ex.: Comercial" />
      </div>
      <div class="form-group">
        <label>Descrição</label>
        <textarea id="mDesc" rows="2" placeholder="Breve descrição do dashboard…"></textarea>
      </div>
      <div class="form-group">
        <label>URL do relatório Power BI</label>
        <input type="url" id="mUrl" placeholder="https://app.powerbi.com/..." />
      </div>
      <div id="msgDb" style="display:none;font-size:13px;padding:8px 12px;border-radius:6px;margin-bottom:8px;"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancelar">Cancelar</button>
        <button class="btn-save" id="btnSalvar">Salvar Dashboard</button>
      </div>
    </div>

    <!-- Aba Usuário -->
    <div id="panelUser" style="display:none;">
      <div class="form-group">
        <label>E-mail do novo usuário</label>
        <input type="email" id="uEmail" placeholder="usuario@renaux.com.br" />
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="uSenha" placeholder="Mínimo 6 caracteres" />
      </div>
      <div id="msgUser" style="display:none;font-size:13px;padding:8px 12px;border-radius:6px;margin-bottom:8px;"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancelarUser">Cancelar</button>
        <button class="btn-save" id="btnCriarUser">Criar Usuário</button>
      </div>
    </div>

  </div>
</div>


<script>
  // ─── Supabase config ────────────────────────────────────────────────────────
  const SUPABASE_URL  = 'https://rbahvyejqybajnufftio.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiYWh2eWVqcXliYWpudWZmdGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjA5MjIsImV4cCI6MjA4OTYzNjkyMn0.nUIo2CT3o41YL1TT8Hrp5kq-_ZS-bMMf-gvUMCEyYMw';
  const ADMIN_EMAIL   = 'tecnologia@smartdataconsultoria.com';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  let currentUser  = null;
  let allDashboards = [];
  let currentCat   = 'Todos';

  // ─── Autenticação ────────────────────────────────────────────────────────────
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    currentUser = session.user;
    document.getElementById('userEmail').textContent = currentUser.email;

    const isAdmin = currentUser.email === ADMIN_EMAIL;
    if (isAdmin) {
      document.getElementById('adminBar').style.display = 'flex';
      document.getElementById('adminLink').style.display = 'flex';
    }

    await carregarDashboards(isAdmin);
  }

  // ─── Logout ──────────────────────────────────────────────────────────────────
  document.getElementById('btnLogout').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  });

  // ─── Carregar dashboards ──────────────────────────────────────────────────────
  async function carregarDashboards(isAdmin) {
    let query = sb.from('dashboards_clientes').select('*').eq('ativo', true).eq('empresa', 'Renaux');

    if (!isAdmin) {
      query = query.eq('email_cliente', currentUser.email);
    }

    const { data, error } = await query.order('id');

    document.getElementById('loading').style.display = 'none';

    if (error || !data || data.length === 0) {
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    allDashboards = data;
    renderSidebar();
    renderCards('Todos');
  }

  // ─── Sidebar categorias ───────────────────────────────────────────────────────
  function renderSidebar() {
    const cats = [...new Set(allDashboards.map(d => d.categoria || 'Geral'))];
    const list = document.getElementById('categoriasList');
    list.innerHTML = '';

    document.getElementById('badgeTodos').textContent = allDashboards.length;

    cats.forEach(cat => {
      const count = allDashboards.filter(d => (d.categoria || 'Geral') === cat).length;
      const a = document.createElement('a');
      a.href = '#';
      a.className = 'sidebar-item';
      a.dataset.cat = cat;
      a.innerHTML = `
        <span class="item-left">
          <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/></svg>
          ${cat}
        </span>
        <span class="badge">${count}</span>`;
      a.addEventListener('click', e => { e.preventDefault(); setCategoria(cat, a); });
      list.appendChild(a);
    });
  }

  function setCategoria(cat, el) {
    currentCat = cat;
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    renderCards(cat);
  }

  document.getElementById('filterTodos').addEventListener('click', e => {
    e.preventDefault();
    currentCat = 'Todos';
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    document.getElementById('filterTodos').classList.add('active');
    renderCards('Todos');
  });

  // ─── Render cards ────────────────────────────────────────────────────────────
  const BAR_HEIGHTS = [
    [30,55,80,45,70,35,60],
    [60,40,75,50,85,30,65],
    [45,70,35,80,55,75,40],
    [80,50,65,40,70,55,45],
  ];

  function makeBars(idx) {
    const heights = BAR_HEIGHTS[idx % BAR_HEIGHTS.length];
    return heights.map(h =>
      `<div class="thumb-bar" style="height:${h}px;opacity:${0.6 + (h/200).toFixed(2)}"></div>`
    ).join('');
  }

  function renderCards(cat) {
    const grid = document.getElementById('cardsGrid');
    const empty = document.getElementById('emptyState');
    const filtered = cat === 'Todos'
      ? allDashboards
      : allDashboards.filter(d => (d.categoria || 'Geral') === cat);

    if (filtered.length === 0) {
      grid.style.display = 'none';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    grid.style.display  = 'grid';
    grid.innerHTML = '';

    filtered.forEach((db, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 0.07}s`;
      card.innerHTML = `
        <div class="card-thumb">
          <div class="thumb-icon">${makeBars(i)}</div>
        </div>
        <div class="card-body">
          <div class="card-cat">${db.categoria || 'Geral'}</div>
          <div class="card-title">${db.titulo}</div>
          <div class="card-desc">${db.descricao || 'Dashboard de Business Intelligence.'}</div>
          <div class="card-footer">
            <span class="status-dot"><span class="dot"></span> Ativo</span>
            ${db.url
              ? `<a class="btn-open" href="${db.url}" target="_blank">▶ Abrir</a>`
              : `<span style="font-size:12px;color:var(--text-muted);">URL não configurada</span>`}
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  // ─── Modal admin ──────────────────────────────────────────────────────────────
  function switchTab(tab) {
    const isDb = tab === 'db';
    document.getElementById('panelDb').style.display   = isDb ? 'block' : 'none';
    document.getElementById('panelUser').style.display = isDb ? 'none'  : 'block';
    document.getElementById('tabDb').style.borderBottomColor   = isDb ? 'var(--accent)' : 'transparent';
    document.getElementById('tabDb').style.color               = isDb ? 'var(--accent)' : 'var(--text-muted)';
    document.getElementById('tabUser').style.borderBottomColor = isDb ? 'transparent' : 'var(--accent)';
    document.getElementById('tabUser').style.color             = isDb ? 'var(--text-muted)' : 'var(--accent)';
  }

  function fecharModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    ['mEmail','mTitulo','mCategoria','mDesc','mUrl','uEmail','uSenha'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    ['msgDb','msgUser'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
    switchTab('db');
  }

  function showMsg(id, msg, ok) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
    el.style.background = ok ? 'rgba(52,201,126,0.12)' : 'rgba(224,85,85,0.12)';
    el.style.border = ok ? '1px solid rgba(52,201,126,0.3)' : '1px solid rgba(224,85,85,0.3)';
    el.style.color  = ok ? '#5ddb9a' : '#f08080';
  }

  document.getElementById('btnNovoDb').addEventListener('click', () => {
    switchTab('db');
    document.getElementById('modalOverlay').classList.add('open');
  });

  document.getElementById('btnCancelar').addEventListener('click', fecharModal);
  document.getElementById('btnCancelarUser').addEventListener('click', fecharModal);

  // Fechar clicando fora
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) fecharModal();
  });

  // ─── Salvar dashboard ─────────────────────────────────────────────────────────
  document.getElementById('btnSalvar').addEventListener('click', async () => {
    const email  = document.getElementById('mEmail').value.trim();
    const titulo = document.getElementById('mTitulo').value.trim();
    const cat    = document.getElementById('mCategoria').value.trim();
    const desc   = document.getElementById('mDesc').value.trim();
    const url    = document.getElementById('mUrl').value.trim();

    if (!email || !titulo) { showMsg('msgDb', 'E-mail e título são obrigatórios.', false); return; }

    const btn = document.getElementById('btnSalvar');
    btn.disabled = true; btn.textContent = 'Salvando…';

    const { error } = await sb.from('dashboards_clientes').insert([{
      email_cliente: email,
      titulo,
      categoria: cat || 'Geral',
      descricao: desc,
      url: url || null,
      empresa: 'Renaux',
      ativo: true
    }]);

    btn.disabled = false; btn.textContent = 'Salvar Dashboard';

    if (error) { showMsg('msgDb', 'Erro: ' + error.message, false); return; }

    showMsg('msgDb', 'Dashboard cadastrado com sucesso!', true);
    setTimeout(() => { fecharModal(); carregarDashboards(true); }, 1200);
  });

  // ─── Criar usuário ────────────────────────────────────────────────────────────
  document.getElementById('btnCriarUser').addEventListener('click', async () => {
    const email = document.getElementById('uEmail').value.trim();
    const senha = document.getElementById('uSenha').value;

    if (!email || !senha) { showMsg('msgUser', 'Preencha e-mail e senha.', false); return; }
    if (senha.length < 6)  { showMsg('msgUser', 'A senha deve ter no mínimo 6 caracteres.', false); return; }

    const btn = document.getElementById('btnCriarUser');
    btn.disabled = true; btn.textContent = 'Criando…';

    const { error } = await sb.auth.signUp({ email, password: senha });

    btn.disabled = false; btn.textContent = 'Criar Usuário';

    if (error) { showMsg('msgUser', 'Erro: ' + error.message, false); return; }

    showMsg('msgUser', 'Usuário criado! Um e-mail de confirmação foi enviado.', true);
    setTimeout(fecharModal, 2000);
  });

  // ─── Init ────────────────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
