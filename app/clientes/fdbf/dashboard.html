<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FDBF Representações | Dashboards</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --grafite:       #2e2e31;
      --grafite-mid:   #3a3a3e;
      --grafite-light: #46464b;
      --grafite-card:  #242427;
      --grafite-border:#404045;
      --red:           #d04b3d;
      --red-dark:      #a83930;
      --red-glow:      rgba(208,75,61,0.2);
      --white:         #f2f2f2;
      --text-muted:    #8a8a90;
      --sidebar-w:     260px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--grafite);
      color: var(--white);
      min-height: 100vh;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: #1a1a1d;
      border-right: 1px solid var(--grafite-border);
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0; top: 0; bottom: 0;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 28px 24px 24px;
      border-bottom: 1px solid var(--grafite-border);
    }
    .sidebar-logo .brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--white);
    }
    .sidebar-logo .brand span { color: var(--red); }
    .sidebar-logo .sub {
      font-size: 10px; color: var(--text-muted);
      letter-spacing: .5px; margin-top: 2px;
    }

    .sidebar-section-label {
      font-size: 9px; font-weight: 700;
      letter-spacing: 1.8px; text-transform: uppercase;
      color: var(--text-muted);
      padding: 20px 24px 8px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 24px;
      color: var(--text-muted);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all .2s;
      text-decoration: none;
      user-select: none;
    }
    .nav-item:hover {
      color: var(--white);
      background: rgba(255,255,255,0.04);
    }
    .nav-item.active {
      color: var(--white);
      border-left-color: var(--red);
      background: rgba(208,75,61,0.08);
    }
    .nav-item .icon {
      width: 18px; height: 18px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-item .icon svg { width: 16px; height: 16px; fill: currentColor; }

    .sidebar-footer {
      margin-top: auto;
      padding: 20px 24px;
      border-top: 1px solid var(--grafite-border);
    }
    .user-info {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 14px;
    }
    .user-avatar {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .user-name { font-size: 12px; font-weight: 600; color: var(--white); }
    .user-email { font-size: 10px; color: var(--text-muted); margin-top: 1px; word-break: break-all; }
    .btn-logout {
      width: 100%; padding: 9px;
      background: rgba(208,75,61,0.1);
      border: 1px solid rgba(208,75,61,0.25);
      border-radius: 8px;
      color: var(--red); font-family: 'Barlow', sans-serif;
      font-size: 12px; font-weight: 600;
      letter-spacing: .5px; cursor: pointer;
      transition: all .2s;
    }
    .btn-logout:hover {
      background: rgba(208,75,61,0.2);
      border-color: var(--red);
    }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      height: 64px;
      background: #1e1e21;
      border-bottom: 1px solid var(--grafite-border);
      display: flex; align-items: center;
      padding: 0 32px;
      gap: 12px;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 700;
      letter-spacing: 1px; color: var(--white);
    }
    .topbar-badge {
      background: var(--red);
      color: #fff; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
      letter-spacing: .5px; text-transform: uppercase;
    }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .topbar-date { font-size: 12px; color: var(--text-muted); }

    .content {
      flex: 1;
      padding: 32px;
    }

    /* ── GRID DE CARDS DASHBOARD ── */
    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1; height: 1px;
      background: var(--grafite-border);
    }

    .dashboards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .dash-card {
      background: var(--grafite-card);
      border: 1px solid var(--grafite-border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      text-decoration: none;
      display: block;
    }
    .dash-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.4), 0 0 0 1px rgba(208,75,61,0.2);
      border-color: rgba(208,75,61,0.3);
    }

    .dash-card-thumb {
      height: 160px;
      background: linear-gradient(135deg, #1a1a1d 0%, #2a2a2e 100%);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .dash-card-thumb::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(208,75,61,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(208,75,61,0.04) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .dash-card-thumb .thumb-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px var(--red-glow);
      position: relative; z-index: 1;
    }
    .dash-card-thumb .thumb-icon svg { width: 28px; height: 28px; fill: #fff; }

    /* Thumb colorida para quando tiver screenshot */
    .dash-card-thumb.has-img {
      background: #000;
    }
    .dash-card-thumb.has-img img {
      width: 100%; height: 100%; object-fit: cover; opacity: .75;
    }

    .dash-card-body { padding: 18px 20px 20px; }
    .dash-card-body h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px; font-weight: 700;
      letter-spacing: .5px; color: var(--white);
      margin-bottom: 4px;
    }
    .dash-card-body p {
      font-size: 12px; color: var(--text-muted); line-height: 1.5;
    }
    .dash-card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid var(--grafite-border);
    }
    .dash-tag {
      font-size: 10px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--red);
      background: rgba(208,75,61,0.1);
      border: 1px solid rgba(208,75,61,0.2);
      padding: 3px 8px; border-radius: 4px;
    }
    .dash-arrow {
      color: var(--text-muted); font-size: 16px;
      transition: color .2s, transform .2s;
    }
    .dash-card:hover .dash-arrow { color: var(--red); transform: translateX(3px); }

    /* ── IFRAME VIEW ── */
    .iframe-view { display: none; flex: 1; flex-direction: column; }
    .iframe-view.active { display: flex; }
    .iframe-header {
      display: flex; align-items: center; gap: 16px;
      padding: 0 32px; height: 56px;
      background: #1e1e21;
      border-bottom: 1px solid var(--grafite-border);
    }
    .btn-back {
      display: flex; align-items: center; gap: 6px;
      color: var(--red); font-size: 13px; font-weight: 600;
      background: none; border: none; cursor: pointer;
      padding: 0; transition: opacity .2s;
    }
    .btn-back:hover { opacity: .8; }
    .iframe-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px; font-weight: 700; color: var(--white);
    }
    .iframe-wrap {
      flex: 1;
      background: #111;
    }
    .iframe-wrap iframe {
      width: 100%; height: 100%; border: none;
      min-height: calc(100vh - 120px);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
    .empty-state h3 { font-size: 16px; color: var(--white); margin-bottom: 8px; }
    .empty-state p { font-size: 13px; }

    /* ── LOADING ── */
    #loadingScreen {
      position: fixed; inset: 0;
      background: var(--grafite);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      flex-direction: column; gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(208,75,61,0.2);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingScreen p { font-size: 13px; color: var(--text-muted); }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <p>Carregando portal…</p>
</div>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="brand">FDBF <span>Rep.</span></div>
    <div class="sub">Portal de Dashboards</div>
  </div>

  <div class="sidebar-section-label">Navegação</div>

  <a class="nav-item active" id="navDashboards" onclick="showHome()">
    <span class="icon">
      <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
    </span>
    Dashboards
  </a>

  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="userInitial">?</div>
      <div>
        <div class="user-name" id="userName">Carregando…</div>
        <div class="user-email" id="userEmail"></div>
      </div>
    </div>
    <button class="btn-logout" id="btnLogout">Sair</button>
  </div>
</nav>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="topbar-title" id="topbarTitle">Dashboards</span>
    <span class="topbar-badge">Power BI</span>
    <div class="topbar-right">
      <span class="topbar-date" id="topbarDate"></span>
    </div>
  </div>

  <!-- HOME: GRID DE DASHBOARDS -->
  <div class="content" id="homeView">
    <div class="section-title">Relatórios disponíveis</div>

    <div class="dashboards-grid" id="dashGrid">
      <!-- Cards gerados pelo JS -->
    </div>
  </div>

  <!-- IFRAME VIEW -->
  <div class="iframe-view" id="iframeView">
    <div class="iframe-header">
      <button class="btn-back" onclick="showHome()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Voltar
      </button>
      <span class="iframe-title" id="iframeTitle"></span>
    </div>
    <div class="iframe-wrap">
      <iframe id="dashIframe" src="" allowfullscreen></iframe>
    </div>
  </div>

</div>

<script>
  const SUPABASE_URL  = 'https://rbahvyejqybajnufftio.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiYWh2eWVqcXliYWpudWZmdGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjA5MjIsImV4cCI6MjA4OTYzNjkyMn0.nUIo2CT3o41YL1TT8Hrp5kq-_ZS-bMMf-gvUMCEyYMw';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── DASHBOARDS — adicione/edite aqui ──────────────────────────────────────
  // Para cada dashboard, preencha: title, description, tag, url (link embed Power BI)
  const DASHBOARDS = [
    {
      title: 'Dashboard Comercial',
      description: 'Visão geral de vendas, metas e desempenho da equipe comercial.',
      tag: 'Vendas',
      icon: 'chart',
      url: '' // cole aqui o link embed do Power BI
    },
    {
      title: 'Dashboard Financeiro',
      description: 'Faturamento, receitas e indicadores financeiros do período.',
      tag: 'Financeiro',
      icon: 'finance',
      url: ''
    },
    {
      title: 'Dashboard de Produtos',
      description: 'Análise de mix de produtos, categorias e margem por linha.',
      tag: 'Produtos',
      icon: 'box',
      url: ''
    },
  ];
  // ─────────────────────────────────────────────────────────────────────────

  const ICONS = {
    chart: `<svg viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>`,
    finance: `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>`,
    box: `<svg viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>`,
  };

  function buildGrid() {
    const grid = document.getElementById('dashGrid');
    if (!DASHBOARDS.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="icon">📊</div>
        <h3>Nenhum dashboard cadastrado</h3>
        <p>Os dashboards serão exibidos aqui após configuração.</p>
      </div>`;
      return;
    }
    grid.innerHTML = DASHBOARDS.map((d, i) => `
      <div class="dash-card" onclick="openDash(${i})">
        <div class="dash-card-thumb">
          <div class="thumb-icon">${ICONS[d.icon] || ICONS.chart}</div>
        </div>
        <div class="dash-card-body">
          <h3>${d.title}</h3>
          <p>${d.description}</p>
          <div class="dash-card-footer">
            <span class="dash-tag">${d.tag}</span>
            <span class="dash-arrow">→</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  function openDash(index) {
    const d = DASHBOARDS[index];
    if (!d.url) {
      alert('Dashboard em configuração. Em breve disponível!');
      return;
    }
    document.getElementById('iframeTitle').textContent = d.title;
    document.getElementById('dashIframe').src = d.url;
    document.getElementById('homeView').style.display  = 'none';
    document.getElementById('iframeView').classList.add('active');
    document.getElementById('topbarTitle').textContent = d.title;
  }

  function showHome() {
    document.getElementById('homeView').style.display  = 'block';
    document.getElementById('iframeView').classList.remove('active');
    document.getElementById('dashIframe').src          = '';
    document.getElementById('topbarTitle').textContent = 'Dashboards';
  }

  // Data no topbar
  const now = new Date();
  document.getElementById('topbarDate').textContent =
    now.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });

  // Auth check
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = './login.html'; return; }

    const email = session.user.email;
    const initial = email.charAt(0).toUpperCase();
    document.getElementById('userInitial').textContent = initial;
    document.getElementById('userName').textContent    = email.split('@')[0];
    document.getElementById('userEmail').textContent   = email;

    buildGrid();
    document.getElementById('loadingScreen').style.display = 'none';
  })();

  document.getElementById('btnLogout').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = './login.html';
  });
</script>
</body>
</html>
