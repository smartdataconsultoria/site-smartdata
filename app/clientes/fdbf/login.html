<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FDBF Representações | Acesse sua conta</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --grafite:      #2e2e31;
      --grafite-mid:  #3a3a3e;
      --grafite-card: rgba(30,30,33,0.93);
      --grafite-border: rgba(242,242,242,0.1);
      --red:          #d04b3d;
      --red-dark:     #a83930;
      --red-glow:     rgba(208,75,61,0.22);
      --white:        #f2f2f2;
      --text-muted:   #8a8a90;
      --danger:       #e05555;
      --success:      #34c97e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--grafite);
      position: relative;
      overflow: hidden;
    }

    /* Imagem de fundo */
    .bg-image {
      position: fixed;
      inset: 0;
      background-image: url('./fundo.png');
      background-size: cover;
      background-position: center right;
      opacity: 0.18;
      z-index: 0;
    }

    /* Overlay gradiente */
    .bg-overlay {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(46,46,49,0.97) 0%, rgba(46,46,49,0.75) 60%, rgba(208,75,61,0.08) 100%),
        linear-gradient(to right, rgba(46,46,49,1) 30%, transparent 100%);
      z-index: 0;
    }

    /* Grid sutil */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(242,242,242,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(242,242,242,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      z-index: 0;
      pointer-events: none;
    }

    /* Acento vermelho lateral */
    .side-accent {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(to bottom, transparent, var(--red), transparent);
      z-index: 1;
    }

    .card {
      background: var(--grafite-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--grafite-border);
      border-radius: 16px;
      padding: 52px 48px;
      width: 100%; max-width: 440px;
      position: relative; z-index: 2;
      box-shadow:
        0 32px 80px rgba(0,0,0,0.6),
        0 0 0 1px rgba(208,75,61,0.1),
        inset 0 1px 0 rgba(242,242,242,0.05);
      animation: cardIn 0.55s cubic-bezier(.22,.68,0,1.15) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Linha vermelha topo do card */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 24px; right: 24px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      border-radius: 0 0 2px 2px;
    }

    .logo-area { text-align: center; margin-bottom: 36px; }
    .logo-badge {
      width: 64px; height: 64px;
      background: linear-gradient(145deg, var(--red), var(--red-dark));
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 8px 28px var(--red-glow), 0 0 0 6px rgba(208,75,61,0.08);
    }
    .logo-badge svg { width: 32px; height: 32px; fill: #fff; }

    .logo-area h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px; font-weight: 800;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--white); margin-bottom: 4px;
    }
    .logo-area h1 span { color: var(--red); }
    .logo-area p { font-size: 12px; color: var(--text-muted); letter-spacing: .5px; }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--grafite-border), transparent);
      margin: 0 0 28px;
    }

    .field { margin-bottom: 20px; }
    .field label {
      display: block; font-size: 10px; font-weight: 600;
      letter-spacing: 1.4px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 8px;
    }
    .field-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .field-row label { margin-bottom: 0; }
    .forgot { font-size: 11px; color: var(--red); text-decoration: none; cursor: pointer; }
    .forgot:hover { text-decoration: underline; }

    .input-wrap { position: relative; }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%;
      background: rgba(20,20,22,0.7);
      border: 1px solid var(--grafite-border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 14px;
      font-family: 'Barlow', sans-serif;
      color: var(--white); outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(208,75,61,0.12);
    }
    input::placeholder { color: var(--text-muted); }

    .toggle-pwd {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); display: flex; align-items: center;
      padding: 0; transition: color .2s;
    }
    .toggle-pwd:hover { color: var(--red); }

    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: #fff; font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      border: none; border-radius: 10px;
      cursor: pointer; margin-top: 8px;
      transition: opacity .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 4px 20px var(--red-glow);
    }
    .btn-login:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(208,75,61,0.4); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .msg-box {
      border-radius: 8px; font-size: 13px;
      padding: 10px 14px; margin-bottom: 16px; display: none;
    }
    .msg-error  { background: rgba(224,85,85,.1); border: 1px solid rgba(224,85,85,.25); color: #f08080; }
    .msg-success{ background: rgba(52,201,126,.1); border: 1px solid rgba(52,201,126,.25); color: #5ddb9a; }

    .footer-brand {
      text-align: center; margin-top: 30px;
      font-size: 11px; color: var(--text-muted);
      letter-spacing: .3px;
    }
    .footer-brand strong { color: var(--red); }

    .link-voltar {
      display: block; text-align: center; margin-top: 18px;
      font-size: 13px; color: var(--red);
      text-decoration: none; cursor: pointer;
    }
    .link-voltar:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
  <div class="bg-grid"></div>
  <div class="side-accent"></div>

  <!-- CARD LOGIN -->
  <div class="card" id="cardLogin">
    <div class="logo-area">
      <div class="logo-badge">
        <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
      </div>
      <h1>FDBF <span>Representações</span></h1>
      <p>Portal de Dashboards · Inteligência Comercial</p>
    </div>

    <div class="divider"></div>

    <div class="msg-box msg-error" id="loginError"></div>

    <div class="field">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
    </div>

    <div class="field">
      <div class="field-row">
        <label>Senha</label>
        <a class="forgot" id="linkEsqueci">Esqueceu sua senha?</a>
      </div>
      <div class="input-wrap">
        <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
        <button class="toggle-pwd" id="togglePwd" type="button">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="btnLogin">Entrar</button>

    <div class="footer-brand">Desenvolvido pela <strong>SmartData</strong> Consultoria</div>
  </div>

  <!-- CARD RECUPERAR SENHA -->
  <div class="card" id="cardRecovery" style="display:none">
    <div class="logo-area">
      <div class="logo-badge">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      </div>
      <h1>RECUPERAR <span>SENHA</span></h1>
      <p>Enviaremos um link para seu e-mail</p>
    </div>

    <div class="divider"></div>

    <div class="msg-box msg-error"   id="recoveryError"></div>
    <div class="msg-box msg-success" id="recoverySuccess"></div>

    <div class="field">
      <label>E-mail</label>
      <input type="email" id="recoveryEmail" placeholder="seu@email.com" />
    </div>

    <button class="btn-login" id="btnRecovery">Enviar link de recuperação</button>
    <a class="link-voltar" id="linkVoltar">← Voltar ao login</a>

    <div class="footer-brand">Desenvolvido pela <strong>SmartData</strong> Consultoria</div>
  </div>

<script>
  const SUPABASE_URL  = 'https://rbahvyejqybajnufftio.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiYWh2eWVqcXliYWpudWZmdGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjA5MjIsImV4cCI6MjA4OTYzNjkyMn0.nUIo2CT3o41YL1TT8Hrp5kq-_ZS-bMMf-gvUMCEyYMw';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  document.getElementById('togglePwd').addEventListener('click', () => {
    const inp = document.getElementById('senha');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('senha').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  document.getElementById('btnLogin').addEventListener('click', login);

  async function login() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const btn   = document.getElementById('btnLogin');
    document.getElementById('loginError').style.display = 'none';
    if (!email || !senha) { showMsg('loginError', 'Preencha e-mail e senha.'); return; }
    btn.disabled = true; btn.textContent = 'Entrando…';
    const { error } = await sb.auth.signInWithPassword({ email, password: senha });
    if (error) {
      showMsg('loginError', 'E-mail ou senha inválidos. Tente novamente.');
      btn.disabled = false; btn.textContent = 'Entrar';
    } else {
      window.location.href = './dashboard.html';
    }
  }

  document.getElementById('linkEsqueci').addEventListener('click', () => {
    document.getElementById('cardLogin').style.display    = 'none';
    document.getElementById('cardRecovery').style.display = 'block';
  });
  document.getElementById('linkVoltar').addEventListener('click', () => {
    document.getElementById('cardRecovery').style.display = 'none';
    document.getElementById('cardLogin').style.display    = 'block';
  });
  document.getElementById('recoveryEmail').addEventListener('keydown', e => { if (e.key === 'Enter') enviarRecuperacao(); });
  document.getElementById('btnRecovery').addEventListener('click', enviarRecuperacao);

  async function enviarRecuperacao() {
    const email = document.getElementById('recoveryEmail').value.trim();
    const btn   = document.getElementById('btnRecovery');
    document.getElementById('recoveryError').style.display   = 'none';
    document.getElementById('recoverySuccess').style.display = 'none';
    if (!email) { showMsg('recoveryError', 'Informe seu e-mail.'); return; }
    btn.disabled = true; btn.textContent = 'Enviando…';
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://fdbfrepresentacoes.smartdataconsultoria.com/reset-senha.html'
    });
    btn.disabled = false; btn.textContent = 'Enviar link de recuperação';
    if (error) { showMsg('recoveryError', 'Erro ao enviar. Verifique o e-mail.'); }
    else {
      document.getElementById('recoverySuccess').textContent = 'Link enviado! Verifique sua caixa de entrada.';
      document.getElementById('recoverySuccess').style.display = 'block';
    }
  }

  function showMsg(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.style.display = 'block';
  }

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = './dashboard.html';
  })();
</script>
</body>
</html>
